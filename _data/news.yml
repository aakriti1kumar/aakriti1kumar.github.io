# Add news by adding an entry at the TOP of this list.
# Fields:
#   date:  shown as-is (e.g. "Feb 2026")
#   text:  the news item (markdown links NOT supported here; use link/link_text)
#   link:  optional URL (a paper, a talk page, or a LinkedIn post URL)
#   link_text: optional label for the link (defaults to "Read more")
#   linkedin: true  -> shows a LinkedIn icon next to the link
#
# Example of a LinkedIn post as news:
# - date: "Mar 2026"
#   text: "I wrote about what our empathy RCT taught us about AI coaching."
#   link: "https://www.linkedin.com/posts/aakriti1kumar_your-post-url-here"
#   link_text: "Read on LinkedIn"
#   linkedin: true
#
# To show the actual post inline (LinkedIn's official embed):
# on your post, click "..." -> "Embed this post" -> copy the src URL from the iframe code,
# then add:
#   embed: "https://www.linkedin.com/embed/feed/update/urn:li:share:XXXXXXXXXX"
#   embed_height: 500   # optional, default 400; match what LinkedIn's embed code suggests

