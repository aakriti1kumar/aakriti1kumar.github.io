# Cards shown in "Selected work" on the homepage.
# Fields:
#   figure, figure_alt:  optional image shown at the top of the card (path relative to site root,
#                        e.g. "images/fig-llm-judges.png"); the icon is shown when no figure is set
#   title, link:      paper title and where it points
#   venue:            e.g. "Nature Machine Intelligence, 2026" or "Under review"
#   status:           "published" | "review"  (controls pill color)
#   icon:             a Font Awesome class, e.g. "fa-solid fa-gamepad"
#   blurb:            one short line under the title (optional)
#   demo_text, demo_link:  optional call-to-action row at the bottom

